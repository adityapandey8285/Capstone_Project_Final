# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"

metadata:
  name: vendor-management

type: application

resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8

builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateCachebusterInfo
      configuration:
        archiveName: vendor-management
        relativePaths: true
        additionalFiles:
          - xs-app.json